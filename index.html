<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Available Rental Flats · SoBoFlats</title>
  <style>
    :root{--bg:#0a1a17;--card:#0d2118;--card-b:rgba(255,255,255,.09);--text:#fff;--sub:rgba(255,255,255,.55);--muted:rgba(255,255,255,.35);--accent:#48c78e;--tab-a:rgba(72,199,142,.2);--tab-ab:rgba(72,199,142,.4);}
    [data-theme="light"]{--bg:#f0ece3;--card:rgba(255,255,251,.9);--card-b:rgba(0,0,0,.09);--text:#111;--sub:rgba(20,20,20,.6);--muted:rgba(20,20,20,.35);--accent:#1a8a5a;}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:430px;margin:0 auto;padding-bottom:32px}
    .header{padding:20px 16px 0;display:flex;align-items:flex-start;justify-content:space-between}
    .header-title-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .header-title{font-size:18px;font-weight:800;letter-spacing:-.3px;text-transform:uppercase}
    .header-date{font-size:10px;font-weight:600;color:var(--muted);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:3px 8px;letter-spacing:.2px;white-space:nowrap}
    [data-theme="light"] .header-date{background:rgba(0,0,0,.06);border-color:rgba(0,0,0,.10)}
    .header-count{font-size:12px;color:var(--muted);margin-top:4px}
    .toggle-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:20px;padding:7px 14px;font-size:11px;font-weight:700;color:var(--sub);cursor:pointer;flex-shrink:0}
    [data-theme="light"] .toggle-btn{background:rgba(0,0,0,.07);border-color:rgba(0,0,0,.14)}
    .tab-row{display:flex;gap:6px;padding:16px 16px 8px;overflow-x:auto;scrollbar-width:none}
    .tab-row::-webkit-scrollbar{display:none}
    .tab-btn{flex-shrink:0;padding:8px 16px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:rgba(255,255,255,.6);transition:all .15s}
    .tab-btn.active{background:var(--tab-a);border-color:var(--tab-ab);color:var(--accent)}
    [data-theme="light"] .tab-btn{border-color:rgba(0,0,0,.12);background:rgba(0,0,0,.05);color:rgba(0,0,0,.5)}
    [data-theme="light"] .tab-btn.active{background:rgba(26,138,90,.12);border-color:rgba(26,138,90,.35);color:var(--accent)}
    .listings{padding:8px 12px}
    .listing-card{display:flex;gap:12px;padding:14px;margin-bottom:10px;background:var(--card);border:1px solid var(--card-b);border-radius:16px;text-decoration:none;cursor:pointer}
    .listing-thumb{width:80px;height:80px;border-radius:12px;object-fit:cover;flex-shrink:0;background:rgba(255,255,255,.08)}
    .listing-info{flex:1;display:flex;flex-direction:column;justify-content:center;gap:4px}
    .listing-name{font-size:14px;font-weight:700;color:var(--text)}
    .listing-loc-inline{font-size:12px;font-weight:400;color:var(--muted)}
    .listing-meta{font-size:12px;color:var(--sub)}
    .listing-rent{font-size:15px;font-weight:800;color:var(--accent)}
    .empty{text-align:center;color:var(--muted);font-size:14px;padding:48px 16px}
    .loading{text-align:center;color:var(--muted);font-size:13px;padding:48px 16px}
  </style>
</head>
<body>
  <div class="header">
    <div>
      <div class="header-title-row">
        <div class="header-title">Available Rental Flats</div>
        <span class="header-date">21-May-26</span>
      </div>
      <div class="header-count" id="hCount">Loading...</div>
    </div>
    <button class="toggle-btn" onclick="toggleTheme()">Day / Night</button>
  </div>
  <div class="tab-row" id="tabRow"></div>
  <div class="listings" id="listings"><div class="loading">Loading listings...</div></div>

  <script>
    const BUCKET_ORDER=['1 RK','1 & 1.5 BHK','2 & 2.5 BHK','3 & 3.5 BHK','4 & 4.5 BHK','5 & 5.5 BHK'];
    let allListings=[], activeBucket='';

    function toggleTheme(){const h=document.documentElement,d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'light':'dark');}

    function renderListings(bucket){
      activeBucket=bucket;
      const items=allListings.filter(l=>l.bucket===bucket);
      const el=document.getElementById('listings');
      if(!items.length){el.innerHTML='<div class="empty">No listings in this category</div>';return;}
      el.innerHTML=items.map(l=>{
        const locStr=l.location?` <span class="listing-loc-inline">&nbsp;·&nbsp;${l.location}</span>`:'';
        const colLStr=l.col_l?' · '+l.col_l:'';
        return `<a class="listing-card" href="${l.url}">
        <img class="listing-thumb" src="${l.thumb||''}" alt="" loading="lazy">
        <div class="listing-info">
          <div class="listing-name">${l.project}${locStr}</div>
          <div class="listing-meta">${l.bhk}${l.carpet?' · '+l.carpet+' carpet':''}${colLStr}</div>
          <div class="listing-rent">${l.rent_display}</div>
        </div></a>`;
      }).join('');
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.bucket===bucket));
    }

    function buildTabs(listings){
      const tabRow=document.getElementById('tabRow');
      const buckets=BUCKET_ORDER.filter(b=>listings.some(l=>l.bucket===b));
      tabRow.innerHTML=buckets.map(b=>{
        const cnt=listings.filter(l=>l.bucket===b).length;
        return `<button class="tab-btn" data-bucket="${b}" onclick="renderListings('${b}')">${b} <span style="opacity:.5">(${cnt})</span></button>`;
      }).join('');
      return buckets;
    }

    fetch('./active.json?_='+Date.now())
      .then(r=>r.json())
      .then(data=>{
        allListings=data.listings||[];
        document.getElementById('hCount').textContent=allListings.length+' listing'+(allListings.length!==1?'s':'')+' available';
        const buckets=buildTabs(allListings);
        if(buckets.length){renderListings(buckets[0]);}
        else{document.getElementById('listings').innerHTML='<div class="empty">No listings currently available</div>';}
      })
      .catch(()=>{document.getElementById('listings').innerHTML='<div class="empty">Could not load listings</div>';});
  </script>
</body>
</html>
